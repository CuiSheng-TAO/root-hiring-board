<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ROOT 全栈工程师 · 招聘看板</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Newsreader:ital,wght@0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400;500;600&family=Noto+Serif+SC:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root {
    /* Paper surface */
    --paper: #FBFAF7;
    --paper-2: #F5F4EF;
    --card: #FFFFFF;
    --rule: #E8E6DF;
    --rule-strong: #D8D5CB;

    /* Ink */
    --ink: #2A2824;
    --ink-soft: #4A4844;
    --ink-dim: #7A7771;
    --ink-faint: #A8A49C;

    /* Single accent — Newsreader orange */
    --accent: #B84A1F;
    --accent-soft: rgba(184, 74, 31, 0.08);

    /* States — muted only */
    --good: #2E6B3F;
    --warn: #A22B1F;
    --warn-bg: #FBF0EE;
    --pending: #8C5B12;
    --pending-bg: #FBF5E8;
    --muted: #9B9992;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    overflow: hidden;
    background: var(--paper);
    color: var(--ink);
    font-family: 'Inter', -apple-system, 'PingFang SC', 'Noto Sans SC', sans-serif;
    font-size: 13px;
    line-height: 1.55;
    font-feature-settings: "cv11", "ss01", "ss03";
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  body {
    background:
      radial-gradient(ellipse 90% 70% at 50% 0%, #FEFCF7 0%, var(--paper) 60%),
      var(--paper);
  }

  /* ─── Dashboard shell ─── */
  .dashboard {
    max-width: 1320px;
    height: 100vh;
    max-height: 900px;
    margin: 0 auto;
    padding: 36px 48px 32px;
    display: grid;
    grid-template-rows: auto 1fr;
    gap: 28px;
  }

  /* ─── Header ─── */
  header.masthead {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    padding-bottom: 18px;
    border-bottom: 1px solid var(--rule);
  }

  .eyebrow {
    font-family: 'JetBrains Mono', 'SF Mono', monospace;
    font-size: 10px;
    font-weight: 500;
    color: var(--ink-dim);
    letter-spacing: 2.4px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  h1.title {
    font-family: 'Newsreader', 'Noto Serif SC', Georgia, serif;
    font-weight: 500;
    font-size: 28px;
    line-height: 1.1;
    letter-spacing: -0.3px;
    color: var(--ink);
  }

  h1.title em {
    font-style: italic;
    font-weight: 500;
    color: var(--accent);
  }

  .masthead-meta {
    text-align: right;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--ink-dim);
    line-height: 1.7;
  }

  .masthead-meta .live-dot {
    display: inline-block;
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--good);
    margin-right: 6px;
    vertical-align: middle;
  }

  /* ─── Layout grid ─── */
  main.layout {
    display: grid;
    grid-template-columns: 260px 1fr 280px;
    gap: 48px;
    min-height: 0;
  }

  .col {
    min-width: 0;
    display: flex;
    flex-direction: column;
  }

  /* ─── Section labels ─── */
  .section-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    font-weight: 600;
    color: var(--ink-dim);
    letter-spacing: 1.8px;
    text-transform: uppercase;
    margin-bottom: 14px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--rule);
    display: flex;
    align-items: baseline;
    justify-content: space-between;
  }

  .section-label .tail {
    font-family: 'Inter', sans-serif;
    font-size: 10px;
    font-weight: 400;
    color: var(--ink-faint);
    letter-spacing: 0;
    text-transform: none;
  }

  /* ─── Objective (left) ─── */
  .objective-prose {
    font-family: 'Newsreader', 'Noto Serif SC', serif;
    font-size: 14px;
    line-height: 1.65;
    color: var(--ink-soft);
    margin-bottom: 22px;
  }

  .objective-prose strong {
    font-style: italic;
    font-weight: 600;
    color: var(--accent);
  }

  .metric-table {
    width: 100%;
    border-collapse: collapse;
    margin-bottom: 22px;
  }

  .metric-table td {
    padding: 10px 0;
    border-bottom: 1px solid var(--rule);
  }

  .metric-table td:first-child {
    font-size: 12px;
    color: var(--ink-dim);
  }

  .metric-table td:last-child {
    text-align: right;
    font-family: 'JetBrains Mono', monospace;
    font-size: 20px;
    font-weight: 600;
    color: var(--ink);
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.5px;
  }

  .metric-table td.accent { color: var(--accent); }
  .metric-table td.warn { color: var(--warn); }

  .progress-line {
    margin-top: 4px;
  }

  .progress-bar {
    height: 3px;
    background: var(--rule);
    position: relative;
    border-radius: 0;
  }

  .progress-fill {
    height: 100%;
    background: var(--accent);
    position: relative;
  }

  .progress-fill::after {
    content: '';
    position: absolute;
    right: -3px;
    top: -2.5px;
    width: 8px;
    height: 8px;
    background: var(--accent);
    border-radius: 50%;
    border: 2px solid var(--paper);
  }

  .progress-meta {
    display: flex;
    justify-content: space-between;
    margin-top: 10px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--ink-dim);
  }

  /* ─── Funnel as table (center) ─── */
  .funnel-table {
    width: 100%;
    border-collapse: collapse;
    font-variant-numeric: tabular-nums;
  }

  .funnel-table thead th {
    text-align: left;
    font-size: 10px;
    font-weight: 500;
    color: var(--ink-faint);
    letter-spacing: 0.8px;
    text-transform: uppercase;
    padding: 0 12px 12px;
    border-bottom: 1px solid var(--rule);
  }

  .funnel-table thead th.num {
    text-align: right;
  }

  .funnel-table tbody tr {
    border-bottom: 1px solid var(--rule);
    transition: background 0.15s;
  }

  .funnel-table tbody tr:hover {
    background: var(--paper-2);
  }

  .funnel-table tbody tr.anomaly {
    background: var(--warn-bg);
    position: relative;
  }

  .funnel-table tbody tr.anomaly::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 2px;
    background: var(--warn);
  }

  .funnel-table tbody td {
    padding: 18px 12px;
    vertical-align: middle;
  }

  .stage-name {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .stage-name .primary {
    font-family: 'Newsreader', 'Noto Serif SC', serif;
    font-size: 16px;
    font-weight: 500;
    color: var(--ink);
    letter-spacing: -0.2px;
  }

  .stage-name .secondary {
    font-size: 10px;
    color: var(--ink-faint);
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.3px;
  }

  .funnel-table td.num {
    text-align: right;
    font-family: 'JetBrains Mono', monospace;
    font-size: 17px;
    font-weight: 500;
    color: var(--ink);
    letter-spacing: -0.3px;
  }

  .funnel-table td.num .unit {
    font-size: 11px;
    color: var(--ink-faint);
    margin-left: 2px;
    font-weight: 400;
  }

  .funnel-table td.rate {
    text-align: right;
    width: 110px;
  }

  .funnel-table td.rate .pct {
    font-family: 'JetBrains Mono', monospace;
    font-size: 15px;
    font-weight: 600;
    color: var(--ink);
    letter-spacing: -0.3px;
  }

  .funnel-table tr.anomaly td.rate .pct {
    color: var(--warn);
  }

  .rate-bar {
    margin-top: 5px;
    height: 2px;
    background: var(--rule);
    width: 100%;
    position: relative;
  }

  .rate-bar .fill {
    height: 100%;
    background: var(--ink-soft);
  }

  tr.anomaly .rate-bar .fill {
    background: var(--warn);
  }

  .warn-marker {
    display: inline-block;
    font-size: 10px;
    color: var(--warn);
    font-weight: 600;
    margin-left: 6px;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.5px;
  }

  /* ─── Funnel summary footnote ─── */
  .funnel-summary {
    margin-top: 18px;
    padding: 14px 16px;
    background: var(--paper-2);
    border-left: 2px solid var(--ink-soft);
    font-family: 'Newsreader', 'Noto Serif SC', serif;
    font-size: 13px;
    line-height: 1.65;
    color: var(--ink-soft);
  }

  .funnel-summary strong {
    color: var(--ink);
    font-weight: 600;
    font-style: italic;
  }

  .funnel-summary .accent-num {
    font-family: 'JetBrains Mono', monospace;
    font-style: normal;
    font-weight: 600;
    color: var(--accent);
    font-size: 14px;
  }

  .funnel-summary .warn-num {
    font-family: 'JetBrains Mono', monospace;
    font-style: normal;
    font-weight: 600;
    color: var(--warn);
    font-size: 14px;
  }

  /* ─── Compare table ─── */
  .compare-section {
    margin-top: 26px;
  }

  .compare-table {
    width: 100%;
    border-collapse: collapse;
    font-variant-numeric: tabular-nums;
  }

  .compare-table th {
    text-align: right;
    font-size: 10px;
    font-weight: 500;
    color: var(--ink-faint);
    letter-spacing: 0.8px;
    text-transform: uppercase;
    padding: 0 10px 10px;
  }

  .compare-table th:first-child {
    text-align: left;
  }

  .compare-table td {
    padding: 10px;
    border-bottom: 1px solid var(--rule);
    font-size: 12px;
  }

  .compare-table td:first-child {
    color: var(--ink-soft);
  }

  .compare-table td.num {
    text-align: right;
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    font-weight: 500;
    color: var(--ink);
  }

  .compare-table td.delta {
    text-align: right;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--ink-dim);
    width: 70px;
  }

  .compare-table tr.anomaly td {
    background: var(--warn-bg);
  }

  .compare-table tr.anomaly td.num,
  .compare-table tr.anomaly td.delta {
    color: var(--warn);
    font-weight: 600;
  }

  /* ─── HR exit (right) ─── */
  .candidate-list {
    list-style: none;
  }

  .candidate-row {
    display: grid;
    grid-template-columns: 16px 1fr auto;
    gap: 12px;
    align-items: baseline;
    padding: 14px 0;
    border-bottom: 1px solid var(--rule);
  }

  .candidate-row:last-child {
    border-bottom: 1px solid var(--rule);
  }

  .candidate-marker {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 600;
    text-align: center;
    line-height: 1;
  }

  .marker-accept { color: var(--good); }
  .marker-pending { color: var(--pending); }
  .marker-reject { color: var(--ink-faint); }
  .marker-decline { color: var(--warn); }

  .candidate-body {
    display: flex;
    flex-direction: column;
    gap: 2px;
    min-width: 0;
  }

  .candidate-name {
    font-family: 'Newsreader', 'Noto Serif SC', serif;
    font-size: 15px;
    font-weight: 500;
    color: var(--ink);
    letter-spacing: -0.2px;
  }

  .candidate-meta {
    font-size: 10px;
    color: var(--ink-faint);
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.2px;
  }

  .candidate-row.row-reject .candidate-name,
  .candidate-row.row-decline .candidate-name {
    color: var(--ink-dim);
  }

  .candidate-status-label {
    font-size: 11px;
    color: var(--ink-dim);
    text-align: right;
    align-self: center;
    white-space: nowrap;
  }

  .candidate-row.row-accept .candidate-status-label {
    color: var(--good);
    font-weight: 500;
  }
  .candidate-row.row-pending .candidate-status-label {
    color: var(--pending);
    font-weight: 500;
  }
  .candidate-row.row-decline .candidate-status-label {
    color: var(--warn);
  }

  /* ─── Summary bar under candidates ─── */
  .hr-summary {
    display: flex;
    gap: 16px;
    margin-top: 16px;
    padding: 12px 0;
    border-top: 1px solid var(--rule);
    border-bottom: 1px solid var(--rule);
    font-variant-numeric: tabular-nums;
  }

  .hr-summary-item {
    flex: 1;
  }

  .hr-summary-item .n {
    font-family: 'JetBrains Mono', monospace;
    font-size: 18px;
    font-weight: 600;
    color: var(--ink);
    line-height: 1;
  }

  .hr-summary-item .lbl {
    font-size: 10px;
    color: var(--ink-dim);
    margin-top: 4px;
    letter-spacing: 0.3px;
  }

  /* ─── Action items ─── */
  .action-section {
    margin-top: 26px;
  }

  .action-list {
    list-style: none;
  }

  .action-row {
    display: flex;
    gap: 10px;
    align-items: flex-start;
    padding: 10px 0;
    font-size: 12px;
    line-height: 1.5;
    color: var(--ink-soft);
    border-bottom: 1px dashed var(--rule);
  }

  .action-row:last-child {
    border-bottom: none;
  }

  .action-row .bullet {
    flex-shrink: 0;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--ink-dim);
    font-weight: 600;
  }

  .action-row.warn .bullet { color: var(--warn); }
  .action-row.warn { color: var(--ink); }

  .action-row strong {
    color: var(--ink);
    font-weight: 600;
  }

  .action-row.empty {
    color: var(--ink-faint);
    font-style: italic;
  }

  /* ─── Links ─── */
  a.link {
    color: inherit;
    text-decoration: none;
    border-bottom: 1px solid var(--rule-strong);
    padding-bottom: 1px;
    transition: color 0.15s, border-color 0.15s;
  }

  a.link:hover {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }

  a.link.subtle {
    border-bottom-color: transparent;
  }

  a.link.subtle:hover {
    border-bottom-color: var(--accent);
  }

  /* ─── Tiny entrance fade ─── */
  .fade-in {
    animation: fadeIn 0.6s ease-out backwards;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ─── Scrollbar hidden ─── */
  ::-webkit-scrollbar { display: none; }
  * { scrollbar-width: none; }
</style>
</head>
<body>
<div class="dashboard" id="app"></div>
<script src="data.js"></script>
<script>
(function() {
  const D = DASHBOARD_DATA;
  const L = D.links;

  function link(href, text, subtle) {
    return '<a class="link' + (subtle ? ' subtle' : '') + '" href="' + href + '" target="_blank">' + text + '</a>';
  }

  const i1 = D.interview1;
  const i2 = D.interview2;
  const i1Anomaly = i1.current.rate < i1.bimonth.rate * 0.6;
  const i2Anomaly = i2.current.rate < i2.bimonth.rate * 0.6;

  const pct = Math.round(D.target.current / D.target.goal * 100);

  // Funnel rows — each stage has pass rate within the stage
  const stages = [
    {
      name: '入口 · 欧阳评估',
      sub: 'ENTRY · ASSESSMENT',
      entered: D.entry.resumesSent,
      passed: D.entry.assessPassed,
      rate: D.entry.assessRate,
      link: L.hireReport,
      unit: '份',
      anomaly: false
    },
    {
      name: '笔试 · 已回收',
      sub: 'WRITTEN TEST',
      entered: D.writtenTest.collected,
      passed: D.writtenTest.passed,
      rate: Math.round(D.writtenTest.passed / D.writtenTest.collected * 100),
      link: L.wiki,
      unit: '份',
      anomaly: false
    },
    {
      name: '一面 · 志权',
      sub: '1ST INTERVIEW',
      entered: i1.current.total,
      passed: i1.current.passed,
      rate: i1.current.rate,
      link: L.interview1_3m,
      unit: '人',
      anomaly: i1Anomaly
    },
    {
      name: '二面 · 欧阳',
      sub: '2ND INTERVIEW',
      entered: i2.current.total,
      passed: i2.current.passed,
      rate: i2.current.rate,
      link: L.interview2_detail,
      unit: '人',
      anomaly: i2Anomaly
    }
  ];

  const funnelRowsHTML = stages.map(s => {
    return '<tr class="' + (s.anomaly ? 'anomaly' : '') + '">' +
      '<td>' +
        '<div class="stage-name">' +
          '<span class="primary">' + link(s.link, s.name, true) + '</span>' +
          '<span class="secondary">' + s.sub + '</span>' +
        '</div>' +
      '</td>' +
      '<td class="num">' + s.entered + '<span class="unit">' + s.unit + '</span></td>' +
      '<td class="num">' + s.passed + '<span class="unit">' + s.unit + '</span></td>' +
      '<td class="rate">' +
        '<div class="pct">' + s.rate + '%' + (s.anomaly ? '<span class="warn-marker">⚠ 异常</span>' : '') + '</div>' +
        '<div class="rate-bar"><div class="fill" style="width:' + Math.min(s.rate, 100) + '%"></div></div>' +
      '</td>' +
    '</tr>';
  }).join('');

  // Funnel summary — cumulative conversion
  const cumulativePct = (D.entry.assessPassed * 0 + (i2.current.passed / D.entry.resumesSent * 100)).toFixed(1);
  const summaryHTML =
    '<div class="funnel-summary">' +
      '本期共 <span class="accent-num">' + D.entry.resumesSent + '</span> 份简历进入漏斗，最终 <span class="accent-num">' + i2.current.passed + '</span> 人通过二面，累计转化率 <span class="accent-num">' + cumulativePct + '%</span>。' +
      (i2Anomaly
        ? '二面通过率 <span class="warn-num">' + i2.current.rate + '%</span> 显著低于 12 双月基线 <strong>' + i2.bimonth.rate + '%</strong>，<em>值得关注 pending ' + i2.current.pending + ' 人的最终走向</em>。'
        : '') +
    '</div>';

  // Compare table
  const i1Delta = i1.current.rate - i1.bimonth.rate;
  const i2Delta = i2.current.rate - i2.bimonth.rate;
  const fmtDelta = d => (d >= 0 ? '+' : '') + d + 'pt';

  const compareHTML =
    '<div class="compare-section">' +
      '<div class="section-label">本期 vs 12 双月基线 <span class="tail">baseline comparison</span></div>' +
      '<table class="compare-table">' +
        '<thead><tr><th></th><th>本期</th><th>12 双月</th><th>差异</th></tr></thead>' +
        '<tbody>' +
          '<tr class="' + (i1Anomaly ? 'anomaly' : '') + '">' +
            '<td>一面通过率</td>' +
            '<td class="num">' + link(L.interview1_3m, i1.current.rate + '%', true) + '</td>' +
            '<td class="num">' + link(L.interview1_12m, i1.bimonth.rate + '%', true) + '</td>' +
            '<td class="delta">' + fmtDelta(i1Delta) + '</td>' +
          '</tr>' +
          '<tr class="' + (i2Anomaly ? 'anomaly' : '') + '">' +
            '<td>二面通过率</td>' +
            '<td class="num">' + link(L.interview2_detail, i2.current.rate + '%', true) + '</td>' +
            '<td class="num">' + link(L.interview2_12m, i2.bimonth.rate + '%', true) + '</td>' +
            '<td class="delta">' + fmtDelta(i2Delta) + (i2Anomaly ? ' ⚠' : '') + '</td>' +
          '</tr>' +
        '</tbody>' +
      '</table>' +
    '</div>';

  // HR candidates
  const markerMap = {
    accept:  ['●', 'marker-accept',  'row-accept'],
    pending: ['○', 'marker-pending', 'row-pending'],
    reject:  ['−', 'marker-reject',  'row-reject'],
    decline: ['×', 'marker-decline', 'row-decline']
  };

  const candidatesHTML = D.hrInterview.candidates.map(c => {
    const [glyph, markerCls, rowCls] = markerMap[c.status] || ['·', 'marker-reject', 'row-reject'];
    const meta = [c.role, c.date].filter(Boolean).join(' · ');
    return '<li class="candidate-row ' + rowCls + '">' +
      '<span class="candidate-marker ' + markerCls + '">' + glyph + '</span>' +
      '<div class="candidate-body">' +
        '<span class="candidate-name">' + c.name + '</span>' +
        (meta ? '<span class="candidate-meta">' + meta + '</span>' : '') +
      '</div>' +
      '<span class="candidate-status-label">' + c.label + '</span>' +
    '</li>';
  }).join('');

  const hrAccept = D.hrInterview.candidates.filter(c => c.status === 'accept').length;
  const hrPending = D.hrInterview.candidates.filter(c => c.status === 'pending').length;
  const hrOther = D.hrInterview.candidates.length - hrAccept - hrPending;

  // Action items
  const actionItems = [];
  D.hrInterview.candidates.forEach(c => {
    if (c.status === 'pending' && c.nextAction) {
      actionItems.push({ warn: false, text: '跟进 <strong>' + c.name + '</strong> · ' + c.nextAction });
    }
  });
  if (i2Anomaly) {
    actionItems.push({ warn: true, text: '二面通过率 <strong>' + i2.current.rate + '%</strong> 异常，关注 pending <strong>' + i2.current.pending + '</strong> 人' });
  }

  const actionItemsHTML =
    '<div class="action-section">' +
      '<div class="section-label">待办 <span class="tail">action items</span></div>' +
      '<ul class="action-list">' +
        (actionItems.length === 0
          ? '<li class="action-row empty"><span class="bullet">✓</span><span>暂无待办</span></li>'
          : actionItems.map(a =>
              '<li class="action-row ' + (a.warn ? 'warn' : '') + '">' +
                '<span class="bullet">' + (a.warn ? '⚠' : '→') + '</span>' +
                '<span>' + a.text + '</span>' +
              '</li>'
            ).join('')) +
      '</ul>' +
    '</div>';

  // Assemble
  document.getElementById('app').innerHTML = '' +
    '<header class="masthead fade-in">' +
      '<div>' +
        '<div class="eyebrow">Strategic Hire · Bimonthly</div>' +
        '<h1 class="title">ROOT <em>全栈工程师</em> 招聘看板</h1>' +
      '</div>' +
      '<div class="masthead-meta">' +
        '<div><span class="live-dot"></span>数据周期 ' + D.dataPeriod + '</div>' +
        '<div>更新 ' + D.updateTime + '</div>' +
      '</div>' +
    '</header>' +

    '<main class="layout">' +

      '<aside class="col fade-in" style="animation-delay:0.05s">' +
        '<div class="section-label">本双月目标 <span class="tail">objective</span></div>' +
        '<p class="objective-prose">Root 进一步扩，ROOT 全栈 / 工程全栈型人才不少于 <strong>' + D.target.goal + '</strong> 人。</p>' +
        '<table class="metric-table">' +
          '<tr><td>目标人数</td><td>≥' + D.target.goal + '</td></tr>' +
          '<tr><td>当前在岗</td><td class="accent">' + D.target.current + '</td></tr>' +
          '<tr><td>HC Gap</td><td class="warn">−' + D.target.gap + '</td></tr>' +
        '</table>' +
        '<div class="progress-line">' +
          '<div class="progress-bar"><div class="progress-fill" style="width:' + pct + '%"></div></div>' +
          '<div class="progress-meta"><span>' + D.target.current + ' / ' + D.target.goal + ' 在岗</span><span>' + pct + '%</span></div>' +
        '</div>' +
      '</aside>' +

      '<section class="col fade-in" style="animation-delay:0.1s">' +
        '<div class="section-label">招聘漏斗 <span class="tail">recruitment funnel · ' + D.dataPeriod + '</span></div>' +
        '<table class="funnel-table">' +
          '<thead><tr><th>阶段</th><th class="num">进入</th><th class="num">通过</th><th class="num">通过率</th></tr></thead>' +
          '<tbody>' + funnelRowsHTML + '</tbody>' +
        '</table>' +
        summaryHTML +
        compareHTML +
      '</section>' +

      '<aside class="col fade-in" style="animation-delay:0.15s">' +
        '<div class="section-label">HR 面 · 出口 <span class="tail">' + D.hrInterview.total + ' candidates</span></div>' +
        '<ul class="candidate-list">' + candidatesHTML + '</ul>' +
        '<div class="hr-summary">' +
          '<div class="hr-summary-item"><div class="n" style="color:var(--good)">' + hrAccept + '</div><div class="lbl">Offer 接受</div></div>' +
          '<div class="hr-summary-item"><div class="n" style="color:var(--pending)">' + hrPending + '</div><div class="lbl">待反馈</div></div>' +
          '<div class="hr-summary-item"><div class="n" style="color:var(--ink-dim)">' + hrOther + '</div><div class="lbl">未转化</div></div>' +
        '</div>' +
        actionItemsHTML +
      '</aside>' +

    '</main>';
})();
</script>
</body>
</html>

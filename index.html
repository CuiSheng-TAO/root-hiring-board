<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ROOT 全栈工程师 · 招聘看板</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500&display=swap" rel="stylesheet">
<script>var t=localStorage.getItem('theme');if(t)document.documentElement.setAttribute('data-theme',t);</script>
<style>
  :root {
    --bg:          #FFFFFF;
    --bg-subtle:   #F7F8FA;
    --bg-hover:    #F0F1F3;
    --surface:     #FFFFFF;
    --border:      #E5E7EB;
    --border-hi:   #D1D5DB;

    --ink:         #1F2937;
    --ink-soft:    #374151;
    --ink-dim:     #6B7280;
    --ink-faint:   #D1D5DB;

    /* 强调色 */
    --accent:      #2563EB;
    --accent-soft: rgba(37, 99, 235, 0.08);

    /* 状态色 */
    --green:       #16A34A;
    --green-soft:  rgba(22, 163, 74, 0.08);
    --yellow:      #CA8A04;
    --yellow-soft: rgba(202, 138, 4, 0.08);
    --red:         #DC2626;
    --red-soft:    rgba(220, 38, 38, 0.06);
    --gray:        #9CA3AF;
    --gray-soft:   rgba(156, 163, 175, 0.08);
    --purple:      #7C3AED;
    --purple-soft: rgba(124, 58, 237, 0.08);
  }

  [data-theme="dark"] {
    --bg:          #0F1117;
    --bg-subtle:   #1A1D27;
    --bg-hover:    #242832;
    --surface:     #1A1D27;
    --border:      #2D3242;
    --border-hi:   #3D4356;
    --ink:         #E5E7EB;
    --ink-soft:    #C9CDD5;
    --ink-dim:     #8B92A5;
    --ink-faint:   #3D4356;
    --accent:      #60A5FA;
    --accent-soft: rgba(96, 165, 250, 0.12);
    --green:       #4ADE80;
    --green-soft:  rgba(74, 222, 128, 0.12);
    --yellow:      #FACC15;
    --yellow-soft: rgba(250, 204, 21, 0.12);
    --red:         #F87171;
    --red-soft:    rgba(248, 113, 113, 0.1);
    --gray:        #6B7280;
    --gray-soft:   rgba(107, 114, 128, 0.12);
    --purple:      #A78BFA;
    --purple-soft: rgba(167, 139, 250, 0.12);
  }

  [data-theme="dark"] body {
    background: linear-gradient(180deg, #0A0C12 0%, var(--bg) 120px), var(--bg);
  }

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    overflow-y: auto;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Inter', -apple-system, 'PingFang SC', 'Noto Sans SC', sans-serif;
    font-size: 13px;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
  }

  body {
    background:
      linear-gradient(180deg, #F8F9FA 0%, var(--bg) 120px),
      var(--bg);
  }

  .dashboard {
    max-width: 1320px;
    min-height: 100vh;
    margin: 0 auto;
    padding: 28px 44px 28px;
    display: grid;
    grid-template-rows: auto 1fr;
    gap: 24px;
  }

  /* ─── Header (个人主页风格) ─── */
  .header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    padding-bottom: 28px;
    border-bottom: 1px solid var(--border);
  }

  .header-left {}

  .eyebrow {
    font-size: 11px;
    color: var(--ink-dim);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  h1 {
    font-size: 28px;
    font-weight: 600;
    color: var(--ink);
    letter-spacing: -0.5px;
    line-height: 1.1;
  }

  h1 em {
    font-style: normal;
    color: var(--accent);
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 20px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--ink-dim);
    padding-bottom: 4px;
  }

  .live-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }

  .live-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--green);
    animation: pulse 2.5s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.4; }
  }

  .theme-toggle {
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 4px 8px;
    cursor: pointer;
    font-size: 14px;
    line-height: 1;
    color: var(--ink-dim);
    transition: border-color 0.2s;
  }
  .theme-toggle:hover { border-color: var(--ink-dim); }

  .period-tabs {
    display: flex;
    gap: 2px;
    background: var(--bg-subtle);
    border-radius: 6px;
    padding: 2px;
  }
  .period-tab {
    background: none;
    border: none;
    padding: 3px 10px;
    font-size: 11px;
    font-family: inherit;
    color: var(--ink-dim);
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .period-tab.active {
    background: var(--bg);
    color: var(--ink);
    font-weight: 500;
    box-shadow: 0 1px 2px rgba(0,0,0,0.06);
  }

  .cumulative-tag {
    font-size: 9px;
    color: var(--ink-faint);
    margin-left: 6px;
    font-weight: 400;
    letter-spacing: 0.5px;
  }

  /* ─── Main layout ─── */
  .main {
    display: grid;
    grid-template-columns: 264px 1fr 272px;
    gap: 32px;
    min-height: 0;
  }

  /* ─── Section label ─── */
  .section-label {
    font-size: 11px;
    font-weight: 500;
    color: var(--ink-dim);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 16px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: baseline;
    justify-content: space-between;
  }

  section > .section-label {
    font-size: 12px;
    font-weight: 600;
  }

  .section-label .tail {
    font-size: 11px;
    font-weight: 400;
    color: var(--ink-faint);
    text-transform: none;
    letter-spacing: 0;
  }

  /* ─── Card — no border, subtle surface ─── */
  .card {
    background: var(--bg-subtle);
    border-radius: 6px;
    padding: 16px;
  }

  /* ─── Metric hero: 个人主页风格，无边框 ─── */
  .metric-hero {
    background: var(--bg-subtle);
    border-radius: 8px;
    padding: 20px;
    margin-bottom: 16px;
  }

  .metric-hero .tag {
    font-size: 10px;
    font-weight: 500;
    color: var(--accent);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .metric-hero .big-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 52px;
    font-weight: 700;
    color: var(--ink);
    line-height: 1;
    letter-spacing: -3px;
    margin-bottom: 14px;
  }

  .metric-hero .big-num .sep {
    font-size: 30px;
    color: var(--ink-dim);
    margin: 0 4px;
    letter-spacing: 0;
    font-weight: 400;
  }

  .metric-hero .big-num .gap {
    font-size: 26px;
    color: var(--red);
    margin-left: 10px;
    letter-spacing: -0.5px;
    font-weight: 600;
  }

  .metric-hero .pct-line {
    font-size: 12px;
    color: var(--ink-soft);
    margin-bottom: 10px;
  }

  .progress-bar {
    height: 4px;
    background: var(--border);
    border-radius: 1px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 1px;
  }

  /* ─── Funnel steps ─── */
  .funnel-steps {
    display: flex;
    flex-direction: column;
  }

  .funnel-step {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
  }

  .funnel-step:last-child { border-bottom: none; }

  .funnel-step:hover { background: var(--bg-hover); }

  .funnel-step-head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 6px;
  }

  .funnel-step-head .link {
    font-size: 13px;
    font-weight: 500;
    color: var(--ink);
  }

  .funnel-rate {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: -0.3px;
  }

  .funnel-bar {
    height: 6px;
    background: var(--bg-hover);
    border-radius: 3px;
    overflow: hidden;
    margin-bottom: 6px;
  }

  .funnel-bar-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 3px;
  }

  .funnel-nums {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--ink-dim);
    letter-spacing: -0.2px;
  }

  .funnel-nums .unit {
    font-size: 10px;
    color: var(--ink-faint);
    margin-left: 1px;
  }

  .funnel-step.anomaly .funnel-rate { color: var(--red); }
  .funnel-step.anomaly .funnel-bar-fill { background: var(--red); }

  .warn-tag {
    display: inline-block;
    font-size: 9px;
    font-weight: 600;
    color: var(--red);
    background: var(--red-soft);
    padding: 1px 6px;
    border-radius: 10px;
    margin-left: 6px;
  }

  /* ─── Summary prose: 个人主页风格，无边框 ─── */
  .funnel-prose {
    margin-top: 14px;
    font-size: 12px;
    line-height: 1.8;
    color: var(--ink-dim);
  }

  .funnel-prose strong { color: var(--ink-soft); font-weight: 500; }
  .funnel-prose .n     { font-family: 'JetBrains Mono', monospace; font-weight: 600; color: var(--accent); }
  .funnel-prose .warn  { font-family: 'JetBrains Mono', monospace; font-weight: 600; color: var(--red); }

  /* ─── Compare section ─── */
  .compare-section { margin-top: 20px; }

  .name-lists { margin-top: 12px; }
  .name-list-row { margin-bottom: 8px; font-size: 11px; line-height: 1.8; }
  .name-list-section {
    display: inline-block;
    color: var(--ink-dim);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-right: 6px;
    vertical-align: middle;
  }
  .name-tag {
    display: inline-block;
    margin: 2px 4px 2px 0;
    padding: 1px 7px;
    background: var(--bg-subtle);
    border: 1px solid var(--border);
    border-radius: 10px;
    font-size: 11px;
    color: var(--ink-soft);
    text-decoration: none;
    white-space: nowrap;
    vertical-align: middle;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
  }
  /* 一面: blue */
  .name-tag.stage-i1 {
    border-color: rgba(37, 99, 235, 0.25);
    color: #2563EB;
    background: var(--accent-soft);
  }
  a.name-tag.stage-i1:hover {
    background: var(--accent-soft);
    color: var(--accent);
    border-color: var(--accent);
  }
  /* 二面: purple */
  .name-tag.stage-i2 {
    border-color: rgba(124, 58, 237, 0.25);
    color: #7C3AED;
    background: var(--purple-soft);
  }
  a.name-tag.stage-i2:hover {
    background: var(--purple-soft);
    color: var(--purple);
    border-color: var(--purple);
  }
  /* fallback hover */
  a.name-tag:hover {
    background: var(--accent-soft);
    color: var(--accent);
    border-color: var(--accent);
  }

  .compare-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    font-size: 12px;
  }

  .compare-row:last-child { border-bottom: none; }

  .compare-row .label { color: var(--ink-dim); }

  .compare-row .bars {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .compare-bar {
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .compare-bar-track {
    width: 52px;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .compare-bar-track .fill {
    height: 100%;
    border-radius: 2px;
  }

  .compare-bar-track .fill.current { background: var(--accent); }
  .compare-bar-track .fill.base     { background: var(--border-hi); }

  .compare-bar .pct {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    color: var(--ink-soft);
    width: 30px;
    text-align: right;
  }

  .compare-bar.warn .pct { color: var(--red); }
  .compare-bar.warn .fill.current { background: var(--red); }

  .compare-row .delta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--ink-dim);
    min-width: 44px;
    text-align: right;
  }

  .compare-row.anomaly .label { color: var(--ink-soft); }
  .compare-row.anomaly .delta { color: var(--red); }

  /* ─── Candidate list: 个人主页风格，极简无边框 ─── */
  .candidate-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  .candidate-card {
    padding: 10px 0;
    display: flex;
    align-items: center;
    gap: 12px;
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
  }

  .candidate-card:last-child { border-bottom: none; }
  .candidate-card:hover { background: var(--bg-hover); border-radius: 4px; }

  .candidate-card.status-accept  { opacity: 1; }
  .candidate-card.status-pending { opacity: 1; }
  .candidate-card.status-reject  { opacity: 0.55; }
  .candidate-card.status-decline { opacity: 0.55; }

  /* 圆形头像 */
  .candidate-avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: var(--bg-subtle);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 600;
    flex-shrink: 0;
  }

  .status-accept  .candidate-avatar { border-color: var(--green); color: var(--green); }
  .status-pending .candidate-avatar { border-color: var(--yellow); color: var(--yellow); }
  .status-reject  .candidate-avatar { border-color: var(--gray); color: var(--gray); }
  .status-decline .candidate-avatar { border-color: var(--red); color: var(--red); }

  .candidate-avatar-inner {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 600;
    flex-shrink: 0;
  }

  .status-accept  .candidate-avatar-inner { background: var(--green-soft);  color: var(--green); }
  .status-pending .candidate-avatar-inner { background: var(--yellow-soft); color: var(--yellow); }
  .status-reject  .candidate-avatar-inner { background: var(--gray-soft);   color: var(--gray); }
  .status-decline .candidate-avatar-inner { background: var(--red-soft);    color: var(--red); }

  .candidate-body { flex: 1; min-width: 0; }

  .candidate-name {
    font-size: 13px;
    font-weight: 500;
    color: var(--ink);
    margin-bottom: 1px;
  }

  .status-reject .candidate-name,
  .status-decline .candidate-name { color: var(--ink-dim); text-decoration: line-through; }

  .candidate-meta {
    font-size: 10px;
    color: var(--ink-dim);
    letter-spacing: 0.2px;
  }

  /* 状态徽章 — 个人主页风格，小字细边框 */
  .candidate-badge {
    font-size: 10px;
    font-weight: 500;
    color: var(--ink-dim);
    white-space: nowrap;
    flex-shrink: 0;
  }

  .status-accept  .candidate-badge { color: var(--green); }
  .status-pending .candidate-badge { color: var(--yellow); }
  .status-reject  .candidate-badge { color: var(--ink-dim); }
  .status-decline .candidate-badge { color: var(--red); }

  /* ─── Action items: 无边框无背景 ─── */
  .action-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 0;
    margin-top: 20px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
  }

  .action-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    font-size: 12px;
    line-height: 1.6;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
    color: var(--ink-dim);
  }

  .action-item:last-child { border-bottom: none; }

  .action-item.warn { color: var(--ink-soft); }

  .action-item .bullet {
    font-size: 11px;
    font-weight: 600;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .action-item.warn .bullet { color: var(--red); }
  .action-item:not(.warn) .bullet { color: var(--accent); }

  .action-item strong { color: var(--ink-soft); font-weight: 500; }

  /* ─── Links ─── */
  a.link {
    color: inherit;
    text-decoration: none;
    border-bottom: 1px solid var(--border);
    padding-bottom: 1px;
    transition: color 0.15s, border-color 0.15s;
  }

  a.link:hover { color: var(--accent); border-bottom-color: var(--accent); }

  /* ─── Entrance ─── */
  .fade-in {
    animation: fadeIn 0.5s ease-out backwards;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  ::-webkit-scrollbar { display: none; }
  * { scrollbar-width: none; }
</style>
</head>
<body>
<div class="dashboard" id="app"></div>
<script src="data.js"></script>
<script>
(function() {
  var D = DASHBOARD_DATA;
  var L = D.links;
  var records = D.interviewRecords || [];

  function link(href, text) {
    return '<a class="link" href="' + href + '" target="_blank">' + text + '</a>';
  }

  /* ── Period helpers ── */
  function getPeriodStart(period) {
    var now = new Date();
    switch(period) {
      case 'week':    return new Date(now.getTime() - 7 * 86400000);
      case 'month':   return new Date(now.getFullYear(), now.getMonth(), 1);
      case 'quarter': return new Date(now.getFullYear(), Math.floor(now.getMonth()/3)*3, 1);
      default:        return new Date(0);
    }
  }

  function filterByPeriod(round, period) {
    var start = getPeriodStart(period);
    return records.filter(function(r) {
      return r.round === round && r.date && new Date(r.date) >= start;
    });
  }

  function computeStats(filtered) {
    var total = filtered.length;
    var passed = filtered.filter(function(r) { return r.result && r.result.indexOf('通过') === 0; }).length;
    var pending = filtered.filter(function(r) { return r.result && r.result.indexOf('待定') === 0; }).length;
    return { total: total, passed: passed, pending: pending, rate: total > 0 ? Math.round(passed / total * 100) : 0 };
  }

  var pct = Math.round(D.target.current / D.target.goal * 100);

  /* ── Name→link lookup from all records + HR ── */
  var nameMap = {};
  records.forEach(function(c) {
    if (c.name && c.talent_id && !nameMap[c.name]) nameMap[c.name] = c;
  });
  (D.hrInterview.candidates || []).forEach(function(c) {
    if (c.name && c.talent_id && !nameMap[c.name]) nameMap[c.name] = c;
  });

  /* ── Candidate name list (clickable links) ── */
  function candidateList(cands, sectionLabel, stageClass) {
    if (!cands || !cands.length) return '';
    var cls = stageClass ? ' ' + stageClass : '';
    var links = cands.map(function(c) {
      var info = nameMap[c.name] || c;
      if (info.talent_id && info.application_id) {
        return '<a class="link name-tag' + cls + '" href="https://deepwisdom.feishu.cn/atsx/talent/' + info.talent_id + '?application_id=' + info.application_id + '" target="_blank">' + c.name + '</a>';
      } else if (info.talent_id) {
        return '<a class="link name-tag' + cls + '" href="https://deepwisdom.feishu.cn/hire/talent/' + info.talent_id + '" target="_blank">' + c.name + '</a>';
      }
      return '<a class="link name-tag' + cls + '" href="https://deepwisdom.feishu.cn/hire/talent?keyword=' + encodeURIComponent(c.name) + '" target="_blank">' + c.name + '</a>';
    });
    return '<div class="name-list-row"><span class="name-list-section">' + sectionLabel + '</span> ' + links.join(' ') + '</div>';
  }

  /* ── Candidate cards (HR stage, right column) ── */
  function candidateLink(c) {
    if (c.talent_id && c.application_id) {
      return link('https://deepwisdom.feishu.cn/atsx/talent/' + c.talent_id + '?application_id=' + c.application_id, c.name);
    }
    if (c.talent_id) {
      return link('https://deepwisdom.feishu.cn/hire/talent/' + c.talent_id, c.name);
    }
    return link(L.wiki, c.name);
  }

  var candidatesHTML = D.hrInterview.candidates.map(function(c) {
    var meta = [c.role, c.date].filter(Boolean).join(' · ');
    return '<li class="candidate-card status-' + c.status + '">' +
      '<div class="candidate-avatar-inner">' + c.name.charAt(0) + '</div>' +
      '<div class="candidate-body">' +
        '<div class="candidate-name">' + candidateLink(c) + '</div>' +
        (meta ? '<div class="candidate-meta">' + meta + '</div>' : '') +
      '</div>' +
      '<span class="candidate-badge">' + c.label + '</span>' +
    '</li>';
  }).join('');

  /* ── Period label ── */
  function periodLabel(period) {
    switch(period) {
      case 'week':    return '本周';
      case 'month':   return '本月';
      case 'quarter': return '本季度';
      default:        return '全部';
    }
  }

  /* ── Render (called on period change) ── */
  function render(period) {
    var i1Filtered = filterByPeriod(1, period);
    var i2Filtered = filterByPeriod(2, period);
    var i1Stats = computeStats(i1Filtered);
    var i2Stats = computeStats(i2Filtered);

    // All-time stats for baseline comparison
    var i1All = computeStats(filterByPeriod(1, 'all'));
    var i2All = computeStats(filterByPeriod(2, 'all'));

    var i1Anomaly = i1All.rate > 0 && i1Stats.rate < i1All.rate * 0.6;
    var i2Anomaly = i2All.rate > 0 && i2Stats.rate < i2All.rate * 0.6;

    var isCumulative = period !== 'all';

    /* Funnel */
    var stages = [
      { name: '入口 · 欧阳评估', entered: D.entry.resumesSent, passed: D.entry.assessPassed,
        rate: D.entry.assessRate, link: L.hireReport, unit: '份', anomaly: false, cumulative: isCumulative },
      { name: '笔试 · 已回收', entered: D.writtenTest.collected, passed: D.writtenTest.passed,
        rate: Math.round(D.writtenTest.passed / D.writtenTest.collected * 100),
        link: L.writtenTestPipeline || L.wiki, unit: '份', anomaly: false, cumulative: isCumulative },
      { name: '一面 · 志权', entered: i1Stats.total, passed: i1Stats.passed,
        rate: i1Stats.rate, link: L.interview1_3m, unit: '人', anomaly: i1Anomaly },
      { name: '二面 · 欧阳', entered: i2Stats.total, passed: i2Stats.passed,
        rate: i2Stats.rate, link: L.interview2_detail, unit: '人', anomaly: i2Anomaly }
    ];

    var funnelHTML = stages.map(function(s) {
      return '<div class="funnel-step' + (s.anomaly ? ' anomaly' : '') + '">' +
        '<div class="funnel-step-head">' +
          link(s.link, s.name) +
          '<span class="funnel-rate">' + s.rate + '%' +
            (s.anomaly ? '<span class="warn-tag">⚠ 异常</span>' : '') +
          '</span>' +
        '</div>' +
        '<div class="funnel-bar"><div class="funnel-bar-fill" style="width:' + Math.min(s.rate, 100) + '%"></div></div>' +
        '<div class="funnel-nums">' + s.entered + ' → ' + s.passed + '<span class="unit">' + s.unit + '</span>' +
          (s.cumulative ? '<span class="cumulative-tag">累计</span>' : '') +
        '</div>' +
      '</div>';
    }).join('');

    /* Names */
    var namesHTML =
      (i1Filtered.length ? candidateList(i1Filtered, '一面 · ' + periodLabel(period), 'stage-i1') : '') +
      (i2Filtered.length ? candidateList(i2Filtered, '二面 · ' + periodLabel(period), 'stage-i2') : '');

    /* Compare: selected period vs all-time */
    var maxRate = Math.max(i1Stats.rate, i1All.rate, i2Stats.rate, i2All.rate, 1);
    function bar(w) { return Math.round(w / maxRate * 100); }
    function fmtDelta(d) { return (d >= 0 ? '+' : '') + d + 'pt'; }
    var i1Delta = i1Stats.rate - i1All.rate;
    var i2Delta = i2Stats.rate - i2All.rate;

    var compareHTML = period === 'all' ? '' :
      '<div class="compare-section">' +
        '<div class="section-label">' + periodLabel(period) + ' vs 全部 <span class="tail">baseline</span></div>' +
        '<div class="compare-row' + (i1Anomaly ? ' anomaly' : '') + '">' +
          '<span class="label">一面通过率</span>' +
          '<div class="bars">' +
            '<div class="compare-bar' + (i1Anomaly ? ' warn' : '') + '">' +
              '<div class="compare-bar-track"><div class="fill current" style="width:' + bar(i1Stats.rate) + '%"></div></div>' +
              '<span class="pct">' + link(L.interview1_3m, i1Stats.rate + '%') + '</span>' +
            '</div>' +
            '<div class="compare-bar">' +
              '<div class="compare-bar-track"><div class="fill base" style="width:' + bar(i1All.rate) + '%"></div></div>' +
              '<span class="pct" style="color:var(--ink-dim)">' + i1All.rate + '%</span>' +
            '</div>' +
            '<span class="delta">' + fmtDelta(i1Delta) + '</span>' +
          '</div>' +
        '</div>' +
        '<div class="compare-row' + (i2Anomaly ? ' anomaly' : '') + '">' +
          '<span class="label">二面通过率</span>' +
          '<div class="bars">' +
            '<div class="compare-bar' + (i2Anomaly ? ' warn' : '') + '">' +
              '<div class="compare-bar-track"><div class="fill current" style="width:' + bar(i2Stats.rate) + '%"></div></div>' +
              '<span class="pct">' + link(L.interview2_detail, i2Stats.rate + '%') + '</span>' +
            '</div>' +
            '<div class="compare-bar">' +
              '<div class="compare-bar-track"><div class="fill base" style="width:' + bar(i2All.rate) + '%"></div></div>' +
              '<span class="pct" style="color:var(--ink-dim)">' + i2All.rate + '%</span>' +
            '</div>' +
            '<span class="delta">' + fmtDelta(i2Delta) + (i2Anomaly ? ' ⚠' : '') + '</span>' +
          '</div>' +
        '</div>' +
      '</div>';

    /* Alert */
    var alertHTML = i2Anomaly
      ? '<div class="funnel-prose">⚠ 二面通过率 <span class="warn">' + i2Stats.rate + '%</span> 低于基线 <strong>' + i2All.rate + '%</strong>，关注 pending <strong>' + i2Stats.pending + '</strong> 人。</div>'
      : '';

    /* Action items */
    var actions = [];
    D.hrInterview.candidates.forEach(function(c) {
      if (c.status === 'pending' && c.nextAction) {
        actions.push({ warn: false, text: '跟进 <strong>' + c.name + '</strong> · ' + c.nextAction });
      }
    });
    if (i2Anomaly) {
      actions.push({ warn: true, text: '二面通过率 <strong>' + i2Stats.rate + '%</strong> 异常，关注 pending <strong>' + i2Stats.pending + '</strong> 人' });
    }
    var actionItemsHTML =
      '<ul class="action-list">' +
        (actions.length === 0
          ? '<li class="action-item" style="color:var(--ink-dim);font-style:italic">暂无待办</li>'
          : actions.map(function(a) {
              return '<li class="action-item' + (a.warn ? ' warn' : '') + '">' +
                '<span class="bullet">' + (a.warn ? '!' : '→') + '</span>' +
                '<span>' + a.text + '</span>' +
              '</li>';
            }).join('')) +
      '</ul>';

    /* Write dynamic sections */
    document.getElementById('funnel-content').innerHTML =
      '<div class="funnel-steps">' + funnelHTML + '</div>';
    document.getElementById('names-content').innerHTML = namesHTML;
    document.getElementById('compare-content').innerHTML = compareHTML + alertHTML;
    document.getElementById('actions-content').innerHTML = actionItemsHTML;
  }

  /* ── Static shell (rendered once) ── */
  document.getElementById('app').innerHTML = '' +
    '<header class="header fade-in">' +
      '<div class="header-left">' +
        '<div class="eyebrow">Strategic Hire · Bimonthly</div>' +
        '<h1>ROOT <em>全栈工程师</em> 招聘看板</h1>' +
      '</div>' +
      '<div class="header-right">' +
        '<div class="period-tabs">' +
          '<button class="period-tab active" data-period="all">全部</button>' +
          '<button class="period-tab" data-period="quarter">季度</button>' +
          '<button class="period-tab" data-period="month">月</button>' +
          '<button class="period-tab" data-period="week">周</button>' +
        '</div>' +
        '<span>更新 ' + D.updateTime + '</span>' +
        '<button id="theme-toggle" class="theme-toggle"></button>' +
      '</div>' +
    '</header>' +

    '<main class="main">' +

      /* Left */
      '<aside class="fade-in" style="animation-delay:0.06s;display:flex;flex-direction:column;gap:16px">' +
        '<div class="section-label">本双月目标 <span class="tail">objective</span></div>' +
        '<div class="metric-hero">' +
          '<div class="tag">HC GAP</div>' +
          '<div class="big-num">' +
            '<span>' + D.target.current + '</span>' +
            '<span class="sep">/</span>' +
            '<span>' + D.target.goal + '</span>' +
            '<span class="gap">−' + D.target.gap + '</span>' +
          '</div>' +
          '<div class="pct-line">' + D.target.current + ' / ' + D.target.goal + ' 在岗 · ' + pct + '%</div>' +
          '<div class="progress-bar"><div class="progress-fill" style="width:' + pct + '%"></div></div>' +
        '</div>' +
        '<div class="card" style="font-size:13px;line-height:1.7;color:var(--ink-soft)">' +
          '目标：<strong style="color:var(--ink)">Root 全栈 / 工程全栈</strong> 人才不少于 <strong style="color:var(--accent)">' + D.target.goal + '</strong> 人，当前在岗 <strong style="color:var(--ink)">' + D.target.current + '</strong> 人，还需 <strong style="color:var(--red)">' + D.target.gap + '</strong> 人。' +
        '</div>' +
      '</aside>' +

      /* Center */
      '<section class="fade-in" style="animation-delay:0.1s;display:flex;flex-direction:column;gap:0">' +
        '<div class="section-label">招聘漏斗 <span class="tail" id="funnel-label">funnel</span></div>' +
        '<div class="card" style="padding:0;overflow:hidden" id="funnel-content"></div>' +
        '<div id="names-content"></div>' +
        '<div id="compare-content"></div>' +
      '</section>' +

      /* Right */
      '<aside class="fade-in" style="animation-delay:0.14s;display:flex;flex-direction:column;gap:0">' +
        '<div class="section-label">HR 面 · 出口 <span class="tail">' + D.hrInterview.total + ' 人</span></div>' +
        '<ul class="candidate-list">' + candidatesHTML + '</ul>' +
        '<div class="section-label" style="margin-top:16px">待办 <span class="tail">action items</span></div>' +
        '<div id="actions-content"></div>' +
      '</aside>' +

    '</main>';

  /* ── Initial render ── */
  render('all');

  /* ── Period tab switching ── */
  document.querySelectorAll('.period-tab').forEach(function(tab) {
    tab.addEventListener('click', function() {
      document.querySelector('.period-tab.active').classList.remove('active');
      tab.classList.add('active');
      render(tab.getAttribute('data-period'));
    });
  });

  /* ── Theme toggle ── */
  var btn = document.getElementById('theme-toggle');
  function updateThemeBtn() {
    var dark = document.documentElement.getAttribute('data-theme') === 'dark';
    btn.textContent = dark ? '☀' : '☾';
  }
  btn.addEventListener('click', function() {
    var next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('theme', next);
    updateThemeBtn();
  });
  updateThemeBtn();
})();
</script>
</body>
</html>

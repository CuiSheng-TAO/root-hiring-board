name: Publish Dashboard Data

on:
  push:
    branches: ["main"]
    paths:
      - "data.json"
      - "dashboard.config.json"
      - ".github/workflows/update-data.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: root-dashboard-data
  cancel-in-progress: true

jobs:
  deploy-data:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Prepare Pages artifact
        run: |
          mkdir -p public-data
          cp data.json public-data/data.json
          cp dashboard.config.json public-data/dashboard.config.json

      - uses: actions/upload-pages-artifact@v3
        with:
          path: public-data

      - id: deployment
        uses: actions/deploy-pages@v4
